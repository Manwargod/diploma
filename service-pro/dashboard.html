<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServicePro - Кабинет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0a0c] text-white transition-colors duration-500 min-h-screen flex flex-col" id="appBody">
    
    <header id="mainHeader" class="sticky top-0 z-[100] border-b bg-black/50 border-white/10 backdrop-blur-xl px-6 py-4 flex items-center justify-between transition-colors duration-500">
        <a href="index.html" class="flex items-center gap-4 cursor-pointer">
            <div class="w-10 h-10 bg-[#00f2ff] rounded-xl flex items-center justify-center text-black"><i data-lucide="settings" class="w-[22px] h-[22px]"></i></div>
            <span class="text-xl font-black tracking-tighter hidden sm:block italic uppercase">SERVICETAP.KZ</span>
        </a>
        <nav class="hidden lg:flex items-center gap-8">
            <a href="index.html" class="text-sm font-black uppercase tracking-widest hover:text-[#00f2ff] transition-all">Главная</a>
            <a href="market.html" class="text-sm font-black uppercase tracking-widest hover:text-[#00f2ff] transition-all">Маркет</a>
            <a href="dashboard.html" class="text-sm font-black uppercase tracking-widest text-[#00f2ff]">Кабинет</a>
        </nav>
        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="p-2.5 rounded-full hover:bg-white/5 transition-all"><i data-lucide="sun" class="w-[18px] h-[18px]" id="themeIcon"></i></button>
        </div>
    </header>

    <main class="flex-grow max-w-5xl mx-auto px-6 py-12 space-y-12 w-full">
        <div class="flex items-center justify-between">
            <div>
                <h2 class="text-4xl font-black italic tracking-tighter uppercase">Мои заявки</h2>
                <p class="text-xs font-bold opacity-40 uppercase">Активные и завершенные процессы</p>
            </div>
            <div class="text-right">
                <div class="text-2xl font-black italic text-[#00f2ff]">5400 ₸</div>
                <div class="text-[10px] font-black uppercase opacity-40 italic">Бонусный баланс</div>
            </div>
        </div>
        <div class="space-y-6" id="ordersContainer"></div>
    </main>

    <div id="modalTracking" class="fixed inset-0 z-[200] hidden items-center justify-center p-6 bg-black/90 backdrop-blur-md">
        <div class="theme-box relative w-full max-w-4xl rounded-[3rem] border p-8 md:p-12 max-h-[90vh] overflow-y-auto no-scrollbar bg-[#0f0f12] border-white/10">
            <button onclick="closeModal('modalTracking')" class="absolute top-6 right-6 p-2 text-gray-400 hover:text-white"><i data-lucide="x"></i></button>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12" id="trackingContent"></div>
        </div>
    </div>

    <div id="modalApproval" class="fixed inset-0 z-[210] hidden items-center justify-center p-6 bg-black/95 backdrop-blur-xl">
        <div class="theme-box w-full max-w-xl rounded-[3.5rem] border p-12 space-y-10 bg-[#0a0a0c] border-white/10">
            <div class="text-center space-y-4">
                <div class="w-20 h-20 bg-amber-500/20 rounded-3xl flex items-center justify-center text-amber-500 mx-auto"><i data-lucide="shield-check" class="w-10 h-10"></i></div>
                <h3 class="text-3xl font-black italic uppercase tracking-tighter">Согласование работ</h3>
            </div>
            <div class="space-y-4">
                <button onclick="setApprovalChoice('repair')" id="btnApproveRepair" class="w-full p-6 rounded-3xl border flex items-center justify-between transition-all bg-[#00f2ff]/10 border-[#00f2ff]">
                    <div class="text-left"><div class="font-black italic uppercase text-sm">Полный ремонт</div></div><div class="text-xl font-black italic">45 000 ₸</div>
                </button>
                <button onclick="setApprovalChoice('diagnostic')" id="btnApproveDiag" class="w-full p-6 rounded-3xl border flex items-center justify-between transition-all bg-white/5 border-white/5">
                    <div class="text-left"><div class="font-black italic uppercase text-sm">Отказ (Диагностика)</div></div><div class="text-xl font-black italic">5 000 ₸</div>
                </button>
            </div>
            <div class="space-y-6">
                <label class="flex items-center gap-4 cursor-pointer">
                    <input type="checkbox" id="approvalAgree" onchange="checkApproval()" class="w-6 h-6 accent-[#00f2ff]" />
                    <span class="text-[11px] font-black uppercase opacity-50">Я согласен со стоимостью</span>
                </label>
                <div class="flex gap-4">
                    <button onclick="closeModal('modalApproval')" class="flex-1 py-5 rounded-2xl border border-white/10 font-black uppercase text-xs">Отмена</button>
                    <button id="btnSubmitApproval" onclick="submitApproval()" disabled class="flex-[2] py-5 bg-[#00f2ff] text-black rounded-2xl font-black uppercase text-xs disabled:opacity-20">Подтвердить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
