<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServicePro - Маркет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0a0c] text-white transition-colors duration-500 min-h-screen flex flex-col" id="appBody">
    
    <header id="mainHeader" class="sticky top-0 z-[100] border-b bg-black/50 border-white/10 backdrop-blur-xl px-6 py-4 flex items-center justify-between transition-colors duration-500">
        <a href="index.html" class="flex items-center gap-4 cursor-pointer">
            <div class="w-10 h-10 bg-[#00f2ff] rounded-xl flex items-center justify-center text-black"><i data-lucide="settings" class="w-[22px] h-[22px]"></i></div>
            <span class="text-xl font-black tracking-tighter hidden sm:block italic uppercase">SERVICETAP.KZ</span>
        </a>
        <nav class="hidden lg:flex items-center gap-8">
            <a href="index.html" class="text-sm font-black uppercase tracking-widest hover:text-[#00f2ff] transition-all">Главная</a>
            <a href="market.html" class="text-sm font-black uppercase tracking-widest text-[#00f2ff]">Маркет</a>
            <a href="dashboard.html" class="text-sm font-black uppercase tracking-widest hover:text-[#00f2ff] transition-all">Кабинет</a>
        </nav>
        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="p-2.5 rounded-full hover:bg-white/5 transition-all"><i data-lucide="sun" class="w-[18px] h-[18px]" id="themeIcon"></i></button>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-6 py-12 space-y-12">
        <div class="flex flex-col md:flex-row justify-between items-end gap-6">
            <div class="space-y-4 w-full md:w-auto">
                <h2 class="text-5xl font-black italic tracking-tighter uppercase">Service Market</h2>
                <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar" id="marketCategories"></div>
            </div>
            <div class="relative w-full md:w-96">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 opacity-30 w-5 h-5"></i>
                <input type="text" id="marketSearch" oninput="renderMarket()" placeholder="Поиск техники..." class="w-full pl-12 pr-6 py-4 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-[#00f2ff] font-bold transition-all" />
            </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="marketGrid"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
