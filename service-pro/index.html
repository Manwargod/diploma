<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServicePro - Главная</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0a0c] text-white transition-colors duration-500 min-h-screen flex flex-col" id="appBody">
    
    <header id="mainHeader" class="sticky top-0 z-[100] border-b bg-black/50 border-white/10 backdrop-blur-xl px-6 py-4 flex items-center justify-between transition-colors duration-500">
        <a href="index.html" class="flex items-center gap-4 cursor-pointer">
            <div class="w-10 h-10 bg-[#00f2ff] rounded-xl flex items-center justify-center text-black shadow-[0_0_20px_rgba(0,242,255,0.3)]"><i data-lucide="settings" class="w-[22px] h-[22px]"></i></div>
            <span class="text-xl font-black tracking-tighter hidden sm:block italic uppercase">SERVICETAP.KZ</span>
        </a>
        <nav class="hidden lg:flex items-center gap-8">
            <a href="index.html" class="text-sm font-black uppercase tracking-widest text-[#00f2ff]">Главная</a>
            <a href="market.html" class="text-sm font-black uppercase tracking-widest hover:text-[#00f2ff] transition-all">Маркет</a>
            <a href="dashboard.html" class="text-sm font-black uppercase tracking-widest hover:text-[#00f2ff] transition-all">Кабинет</a>
        </nav>
        <div class="flex items-center gap-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-5 py-2 rounded-2xl border transition-all bg-white/5 border-white/10 hover:border-[#00f2ff]">
                <i data-lucide="user" class="w-[18px] h-[18px] text-[#00f2ff]"></i><span class="text-xs font-black uppercase hidden sm:block">Нурсултан</span>
            </a>
            <button onclick="toggleTheme()" class="p-2.5 rounded-full hover:bg-white/5 transition-all"><i data-lucide="sun" class="w-[18px] h-[18px]" id="themeIcon"></i></button>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-6 pt-20 pb-40 space-y-32">
        <div class="text-center space-y-8 relative">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-2xl h-96 bg-[#00f2ff]/5 blur-[120px] -z-10 rounded-full"></div>
            <h1 class="text-6xl md:text-9xl font-black italic tracking-tighter leading-[0.85] uppercase">
                ТЕХНОЛОГИЧНЫЙ <br /><span class="text-transparent bg-clip-text bg-gradient-to-r from-[#00f2ff] via-[#7000ff] to-[#00f2ff] animate-gradient-x">СЕРВИС</span>
            </h1>
            <p class="max-w-2xl mx-auto text-lg text-gray-500 font-medium">Профессиональный ремонт и кастомные сборки в Казахстане.</p>
            <div class="flex flex-col sm:flex-row justify-center gap-4 pt-4">
                <a href="dashboard.html" class="px-10 py-5 bg-[#00f2ff] text-black font-black rounded-2xl hover:scale-105 transition-all shadow-2xl uppercase italic">Оформить заявку</a>
                <a href="market.html" class="px-10 py-5 font-black rounded-2xl border transition-all uppercase italic bg-white/5 border-white/10 hover:bg-white/10">Перейти в Маркет</a>
            </div>
        </div>
    </main>

    <footer class="py-12 px-6 border-t transition-colors bg-black border-white/5 text-center mt-auto">
        <p class="text-[10px] font-black uppercase opacity-20 tracking-widest">ServicePro Digital LLP • 2024</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
