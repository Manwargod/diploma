<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServicePro - Сборка ПК</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0a0c] text-white min-h-screen flex flex-col" id="appBody">
    
    <header id="mainHeader" class="sticky top-0 z-[100] border-b bg-black/50 border-white/10 backdrop-blur-xl px-6 py-4 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-4">
            <div class="w-10 h-10 bg-[#00f2ff] rounded-xl flex items-center justify-center text-black"><i data-lucide="settings"></i></div>
            <span class="text-xl font-black tracking-tighter italic uppercase">SERVICETAP.KZ</span>
        </a>
        <nav class="hidden lg:flex items-center gap-8">
            <a href="index.html" class="text-sm font-black uppercase hover:text-[#00f2ff] transition-all">Главная</a>
            <a href="repair.html" class="text-sm font-black uppercase hover:text-[#00f2ff] transition-all">Ремонт</a>
            <a href="builder.html" class="text-sm font-black uppercase text-[#00f2ff]">Сборка</a>
            <a href="market.html" class="text-sm font-black uppercase hover:text-[#00f2ff] transition-all">Маркет</a>
        </nav>
        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="p-2.5 rounded-full hover:bg-white/5"><i data-lucide="sun" class="w-[18px] h-[18px]" id="themeIcon"></i></button>
        </div>
    </header>

    <main class="flex-grow max-w-5xl mx-auto px-6 py-20 space-y-16 w-full">
        <div class="text-center space-y-4">
            <h2 class="text-5xl font-black italic uppercase tracking-tighter">Конфигуратор ПК</h2>
            <p class="text-gray-500 font-medium">Выберите пресет или укажите свой бюджет</p>
        </div>

        <div class="flex justify-center">
            <div class="relative flex items-center p-2 rounded-full border border-white/10 bg-[#0f0f12]">
                <div id="buildSliderPill" class="absolute h-[calc(100%-16px)] w-[calc(50%-8px)] rounded-full bg-[#00f2ff] transition-transform duration-500"></div>
                <button onclick="setBuildPurpose('gaming')" id="btnGaming" class="relative z-10 px-8 py-4 font-black uppercase text-sm italic text-black">Гейминг</button>
                <button onclick="setBuildPurpose('work')" id="btnWork" class="relative z-10 px-8 py-4 font-black uppercase text-sm italic text-gray-400">Работа</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="presetContainer"></div>

        <div class="max-w-xl mx-auto p-8 rounded-[2rem] border border-white/5 bg-white/5 text-center">
            <label class="block text-[10px] font-black uppercase opacity-50 mb-4">Свой бюджет (₸)</label>
            <input type="number" id="customBudgetInput" oninput="handleCustomBudget()" placeholder="Напр: 700 000" class="w-full bg-transparent border-b-2 border-white/10 p-4 text-center text-2xl font-black outline-none focus:border-[#00f2ff] transition-all" />
        </div>

        <div class="flex justify-center">
            <button onclick="openModal('modalBuild')" class="px-16 py-6 bg-gradient-to-r from-[#00f2ff] to-[#7000ff] text-black font-black rounded-full uppercase italic shadow-2xl hover:scale-105 transition-all">Оформить сборку</button>
        </div>
    </main>

    <div id="modalBuild" class="fixed inset-0 z-[200] hidden items-center justify-center p-6 bg-black/90 backdrop-blur-md">
        <div class="theme-box w-full max-w-xl rounded-[3rem] border p-12 bg-[#0f0f12] border-white/10 relative">
            <button onclick="closeModal('modalBuild')" class="absolute top-6 right-6 opacity-40 hover:opacity-100"><i data-lucide="x"></i></button>
            <div class="text-center space-y-6">
                <h3 class="text-3xl font-black italic uppercase italic">Ваша заявка принята</h3>
                <p class="text-sm opacity-50 uppercase">Наш менеджер свяжется с вами для уточнения деталей комплектующих.</p>
                <button onclick="window.location.href='index.html'" class="w-full py-5 bg-[#00f2ff] text-black font-black rounded-2xl uppercase">На главную</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Локальные функции для конфигуратора
        function setBuildPurpose(p) {
            const pill = document.getElementById('buildSliderPill');
            const bg = document.getElementById('btnGaming');
            const bw = document.getElementById('btnWork');
            if(p === 'work') {
                pill.style.transform = 'translateX(calc(100% + 8px))';
                bw.classList.replace('text-gray-400', 'text-black');
                bg.classList.replace('text-black', 'text-gray-400');
            } else {
                pill.style.transform = 'translateX(0)';
                bg.classList.replace('text-gray-400', 'text-black');
                bw.classList.replace('text-black', 'text-gray-400');
            }
        }
        function selectPreset(id) {
            selectedPreset = id;
            renderPresets();
        }
    </script>
</body>
</html>
